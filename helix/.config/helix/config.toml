theme = "base16_default_dark"

[editor]
clipboard-provider = "wayland"
line-number = "relative"
mouse = true
cursorline = true
auto-pairs = true
true-color = true
bufferline = "always"
rulers = [100]

[editor.lsp]
display-messages = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"
