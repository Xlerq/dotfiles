general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on; ~/.config/hypr/scripts/monitor_restore.sh
    inhibit_sleep = 2
}

listener {
    timeout = 600
    on-timeout = ~/.config/hypr/scripts/monitor_dim.sh
    on-resume = ~/.config/hypr/scripts/monitor_restore.sh
}

listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on; ~/.config/hypr/scripts/monitor_restore.sh
}
